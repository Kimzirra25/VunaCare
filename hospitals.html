<!DOCTYPE html>
<html>
<head>
<title>Hospitals</title>
<link rel="stylesheet" href="style.css">
   
</head>

<body>

<div class="container">

<div class="sidebar">
<h2 class="logo">VunaCare</h2>

<ul>
<li><a href="index.html">Dashboard</a></li>
<li><a style="color:rgb(94, 255, 0)" href="hospitals.html">Hospitals</a></li>
<li><a href="admin.html" >Admin</a></li>
</ul>
</div>

<div class="main">

<h1>Explore Medical Expertise</h1>

<div class="course-grid">

<div class="card">
<h3>Dermatologist</h3>
<p>Get a skin health report.</p>
<button class="btn enroll-btn">
    Add
</button>
</div>

<div class="card">
<h3>Dentist</h3>
<p>Get a dental check-up.</p>
<button class="btn enroll-btn">
    Add
</button>
</div>

<div class="card">
<h3>Ophthalmologist</h3>
<p>Get a vision report.</p>
<button class="btn enroll-btn">
    Add
</button>
</div>

</div>

</div>

</div>

<div class="modal" id="modal">

<div class="modal-content">
<h2>Course Enrollment</h2>

<p>Enroll in this course?</p>

<button class="btn" id="closeModal">
Close
</button>

</div>

</div>

<script src="js/script.js"></script>

</script>
<script>
const modal = document.getElementById("modal");

const enrollButtons = document.querySelectorAll(".enroll-btn");

const closeModal = document.getElementById("closeModal");

enrollButtons.forEach(button => {
    button.addEventListener("click", () => {
        modal.style.display = "flex";
    });
});

closeModal.addEventListener("click", () => {
    modal.style.display = "none";
});

window.onclick = function(event) {
    if (event.target === modal) {
        modal.style.display = "none";
    }
};
</script>
</body>
</html>
